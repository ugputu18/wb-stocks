# Proxies port 80 → forecast-ui server on 127.0.0.1:3847.
#
# The forecast UI server binds to FORECAST_UI_HOST=127.0.0.1 by default (see
# src/config/env.ts) and we keep it that way so the only network ingress to
# the Node process goes through nginx, which can be reasoned about with
# standard tooling (logs, rate limits, request size caps).
#
# Public entry to this box is via the GCP HTTPS Load Balancer + IAP; this
# vhost is only reachable from health-check and GFE source ranges (see the
# firewall rule in deploy/gcp/README.md).

upstream forecast_ui_upstream {
  server 127.0.0.1:3847;
  keepalive 16;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  # CSV exports and recalculate POST can take a while.
  client_max_body_size 32m;
  proxy_read_timeout   600s;
  proxy_send_timeout   600s;

  # Light access log to journald via stdout; errors go to file.
  access_log /var/log/nginx/forecast-ui.access.log;
  error_log  /var/log/nginx/forecast-ui.error.log warn;

  # Health endpoint of the Node server. Returning 200 means the upstream
  # is alive; the load balancer probes this path through the same vhost.
  location = /api/forecast/health {
    proxy_pass http://forecast_ui_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
  }

  location / {
    proxy_pass http://forecast_ui_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host  $host;
    # Preserve IAP identity headers if upstream ever wants to read them.
    proxy_set_header X-Goog-Authenticated-User-Email $http_x_goog_authenticated_user_email;
    proxy_set_header X-Goog-Iap-Jwt-Assertion        $http_x_goog_iap_jwt_assertion;
    proxy_set_header Authorization     $http_authorization;

    proxy_buffering off;
    proxy_request_buffering off;
  }
}
